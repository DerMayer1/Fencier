<svg width="1120" height="500" viewBox="0 0 1120 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fencier Codex workflow</title>
  <desc id="desc">A left-to-right workflow showing setup, runbook generation, Codex work, verification, and audit output.</desc>
  <rect width="1120" height="500" rx="28" fill="#0B1020"/>
  <rect x="1" y="1" width="1118" height="498" rx="27" stroke="#263149" stroke-width="2"/>
  <text x="64" y="72" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700">Fencier keeps Codex inside the task</text>
  <text x="64" y="108" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Prepare context, guide the session, verify the diff, leave an audit trail.</text>

  <g transform="translate(64 174)">
    <rect width="180" height="132" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="38" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">1. Initialize</text>
    <text x="24" y="68" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">fencier.yaml</text>
    <text x="24" y="92" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">AGENTS.md</text>
  </g>

  <path d="M264 240H338" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  <path d="M330 232L338 240L330 248" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(358 174)">
    <rect width="180" height="132" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="38" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">2. Runbook</text>
    <text x="24" y="68" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">brief</text>
    <text x="24" y="92" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">prompt + checklist</text>
  </g>

  <path d="M558 240H632" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  <path d="M624 232L632 240L624 248" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(652 174)">
    <rect width="180" height="132" rx="16" fill="#111827" stroke="#334155" stroke-width="2"/>
    <text x="24" y="38" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">3. Codex work</text>
    <text x="24" y="68" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">scoped change</text>
    <text x="24" y="92" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">local git diff</text>
  </g>

  <path d="M852 240H926" stroke="#38BDF8" stroke-width="3" stroke-linecap="round"/>
  <path d="M918 232L926 240L918 248" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(946 174)">
    <rect width="120" height="132" rx="16" fill="#052E16" stroke="#22C55E" stroke-width="2"/>
    <text x="24" y="38" fill="#DCFCE7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">4. Verify</text>
    <text x="24" y="68" fill="#86EFAC" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">PASS</text>
    <text x="24" y="92" fill="#86EFAC" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="13">audit.md</text>
  </g>

  <rect x="64" y="366" width="1002" height="64" rx="14" fill="#020617" stroke="#1E293B"/>
  <text x="88" y="405" fill="#CBD5E1" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="16">fencier init --codex  ->  fencier codex runbook implementation  ->  fencier verify</text>
</svg>
