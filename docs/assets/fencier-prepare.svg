<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Fencier Codex prepare terminal output</title><desc id="desc">A terminal window showing a repository ready for a Fencier-governed Codex session.</desc>
