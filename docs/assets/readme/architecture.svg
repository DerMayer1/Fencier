<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fencier package architecture</title>
  <desc id="desc">A package architecture diagram showing core, adapters, codex-kit, and CLI responsibilities.</desc>
  <rect width="1120" height="560" rx="28" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1118" height="558" rx="27" stroke="#D4D4D8" stroke-width="2"/>
  <text x="64" y="76" fill="#18181B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">Small packages, hard boundaries</text>
  <text x="64" y="110" fill="#52525B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Pure policy logic stays separate from filesystem writes, git commands, and terminal output.</text>

  <g transform="translate(64 170)">
    <rect width="230" height="170" rx="18" fill="#F0FDF4" stroke="#22C55E" stroke-width="2"/>
    <text x="24" y="42" fill="#14532D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">core</text>
    <text x="24" y="76" fill="#166534" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="14">@fencier/core</text>
    <text x="24" y="112" fill="#365314" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Policy engine</text>
    <text x="24" y="138" fill="#365314" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">No filesystem access</text>
  </g>

  <g transform="translate(326 170)">
    <rect width="230" height="170" rx="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="24" y="42" fill="#1E3A8A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">adapters</text>
    <text x="24" y="76" fill="#1D4ED8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="14">@fencier/adapters</text>
    <text x="24" y="112" fill="#1E40AF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">AGENTS.md templates</text>
    <text x="24" y="138" fill="#1E40AF" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">No file writes</text>
  </g>

  <g transform="translate(588 170)">
    <rect width="230" height="170" rx="18" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
    <text x="24" y="42" fill="#7C2D12" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">codex-kit</text>
    <text x="24" y="76" fill="#C2410C" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="14">@fencier/codex-kit</text>
    <text x="24" y="112" fill="#9A3412" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Prompts + skills</text>
    <text x="24" y="138" fill="#9A3412" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">No repo inspection</text>
  </g>

  <g transform="translate(850 170)">
    <rect width="206" height="170" rx="18" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
    <text x="24" y="42" fill="#4C1D95" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">cli</text>
    <text x="24" y="76" fill="#6D28D9" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="14">@fencier/cli</text>
    <text x="24" y="112" fill="#5B21B6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Git + files</text>
    <text x="24" y="138" fill="#5B21B6" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Terminal UX</text>
  </g>

  <path d="M179 366V410H953V366" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M953 410L953 392" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <rect x="306" y="414" width="508" height="76" rx="16" fill="#18181B"/>
  <text x="336" y="460" fill="#FAFAFA" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">CLI composes packages into local workflow commands</text>
</svg>
