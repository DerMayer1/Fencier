<svg width="1120" height="520" viewBox="0 0 1120 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fencier verification dashboard</title>
  <desc id="desc">A dashboard-style summary of Fencier verification signals including status, risk, changed files, changed lines, and policy findings.</desc>
  <rect width="1120" height="520" rx="28" fill="#F8FAFC"/>
  <rect x="1" y="1" width="1118" height="518" rx="27" stroke="#CBD5E1" stroke-width="2"/>
  <text x="64" y="74" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800">Deterministic verification</text>
  <text x="64" y="108" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Fencier turns a local git diff into explicit review signals.</text>

  <g transform="translate(64 160)">
    <rect width="230" height="134" rx="18" fill="#ECFDF5" stroke="#22C55E" stroke-width="2"/>
    <text x="24" y="42" fill="#166534" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">STATUS</text>
    <text x="24" y="88" fill="#14532D" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800">PASS</text>
  </g>

  <g transform="translate(322 160)">
    <rect width="230" height="134" rx="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="24" y="42" fill="#1D4ED8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">RISK</text>
    <text x="24" y="88" fill="#1E3A8A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800">LOW</text>
  </g>

  <g transform="translate(580 160)">
    <rect width="230" height="134" rx="18" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
    <text x="24" y="42" fill="#B45309" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">SCORE</text>
    <text x="24" y="88" fill="#78350F" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="800">0</text>
  </g>

  <g transform="translate(838 160)">
    <rect width="218" height="134" rx="18" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
    <text x="24" y="42" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">DIFF</text>
    <text x="24" y="78" fill="#0F172A" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="20">8 files</text>
    <text x="24" y="106" fill="#0F172A" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="20">+309 / -10</text>
  </g>

  <g transform="translate(64 344)">
    <rect width="992" height="108" rx="18" fill="#0F172A"/>
    <text x="28" y="38" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Policy findings</text>
    <circle cx="34" cy="70" r="5" fill="#22C55E"/>
    <text x="52" y="76" fill="#CBD5E1" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="16">None</text>
    <text x="780" y="76" fill="#94A3B8" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, monospace" font-size="16">audit.md + audit.json</text>
  </g>
</svg>
